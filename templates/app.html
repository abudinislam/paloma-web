<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScanlyAI — умное распознавание накладных</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F6F2;
  --card:#FFFFFF;
  --sb:oklch(0.18 0.065 185);
  --bdr:#EDECEA;
  --t1:#2C2C2A;
  --t2:#5F5E5A;
  --t3:#888780;
  --acc:oklch(0.58 0.14 178);
  --accl:oklch(0.96 0.025 178);
  --accd:oklch(0.46 0.14 178);
  --ok:oklch(0.52 0.13 160);
  --okl:oklch(0.95 0.04 160);
  --warn:oklch(0.56 0.13 68);
  --warnl:oklch(0.96 0.04 68);
  --err:oklch(0.48 0.15 25);
  --errl:oklch(0.96 0.04 25);
  --sh:0 1px 4px rgba(0,0,0,.07),0 0 0 1px rgba(0,0,0,.03);
  --shm:0 4px 20px rgba(0,0,0,.12),0 0 0 1px rgba(0,0,0,.04);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--t1)}
#root{min-height:100vh}
button{font-family:inherit}
input{font-family:inherit}
@keyframes sl{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes scanBeam{0%{top:0}100%{top:100%}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
</style>
</head>
<body>
<div id="root"></div>

<!-- React + Babel (CDN) -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Components (loading order matters) -->
<script type="text/babel" src="/static/js/shared.jsx"></script>
<script type="text/babel" src="/static/js/landing.jsx"></script>
<script type="text/babel" src="/static/js/auth.jsx"></script>
<script type="text/babel" src="/static/js/ocr.jsx"></script>
<script type="text/babel" src="/static/js/cabinet.jsx"></script>

<script type="text/babel" src="/static/js/main.jsx"></script>
</body>
</html>
