<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PalomaBot — Вход</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#1D9E75;--teal-light:#E1F5EE;--teal-dark:#085041;
  --gray-50:#F7F6F2;--gray-100:#EDECEA;--gray-200:#D3D1C7;
  --gray-400:#888780;--gray-600:#5F5E5A;--gray-800:#2C2C2A;
  --white:#fff;--radius:12px;--radius-sm:8px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--gray-50);color:var(--gray-800);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
.card{background:var(--white);border:1px solid var(--gray-100);border-radius:var(--radius);width:100%;max-width:360px;padding:2rem}
.logo{font-size:18px;font-weight:700;color:var(--gray-800);text-align:center;margin-bottom:0.25rem}
.logo span{color:var(--teal)}
.logo-sub{font-size:12px;color:var(--gray-400);text-align:center;margin-bottom:2rem}
label{display:block;font-size:12px;font-weight:600;color:var(--gray-600);margin-bottom:6px}
input[type=password]{width:100%;padding:10px 12px;border:1px solid var(--gray-200);border-radius:var(--radius-sm);font-size:14px;color:var(--gray-800);outline:none;transition:border-color 0.15s}
input[type=password]:focus{border-color:var(--teal)}
.btn{width:100%;margin-top:1rem;padding:10px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;border:none;background:var(--teal);color:var(--white);cursor:pointer;transition:background 0.15s}
.btn:hover{background:var(--teal-dark)}
.error{margin-top:0.75rem;padding:10px 12px;background:#FCEBEB;border:1px solid #F7C1C1;border-radius:var(--radius-sm);font-size:13px;color:#791F1F}
.footer{margin-top:1.5rem;text-align:center;font-size:11px;color:var(--gray-400)}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Paloma<span>Bot</span></div>
  <div class="logo-sub">Автоматизация накладных для Paloma365</div>
  <form method="POST">
    <label>Пароль доступа</label>
    <input type="password" name="password" placeholder="Введите пароль" autofocus required>
    {% if error %}
    <div class="error">⚠ {{ error }}</div>
    {% endif %}
    <button type="submit" class="btn">Войти</button>
  </form>
  <div class="footer">Файлы не сохраняются · Данные защищены</div>
</div>
</body>
</html>
